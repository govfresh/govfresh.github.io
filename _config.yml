# Site Information
title: GovFresh
author: GovFresh
tagline: "Design / Technology / Democracy"
description: "Design / Technology / Democracy"
url: https://govfresh.com
timezone: America/Los_Angeles

# Social Media
social:
  name: GovFresh
  links:
    - https://www.facebook.com/govfresh
    - https://www.linkedin.com/company/govfresh
    - https://github.com/govfresh

linkedin: https://www.linkedin.com/company/govfresh

# Build Settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

plugins:
  - jekyll-sitemap
  - jekyll-redirect-from

# Date/Time Formatting
date: "%B %-d, %Y"

# Content Type Limits
# Number limits
briefs-number: &briefs-number 4
books-number: &books-number 5
dm-number: &dm-number 4
labs-number: &labs-number 4
podcast-number: &podcast-number 4
research-number: &research-number 5
thoughts-number: 4
signal-number: &signal-number 1
demos-number: &demos-number 4
papers-number: &papers-number 3
events-number: &events-number 4
orgs-number: &orgs-number 4

# Collections
collections:
  thoughts:
    output: true
    permalink: /thoughts/:title
  events:
    output: true
    permalink: /events/:title
  orgs:
    output: true
    permalink: /orgs/:title
  briefs:
    output: true
    permalink: /briefs/:title
  demos:
    output: true
    permalink: /demos/:title
  dm:
    output: true
    permalink: /dm/:title
  research:
    output: true
    permalink: /research/:title
  books:
    output: true
    permalink: /books/:title
  posts:
    output: true
    permalink: /signal/:title
  labs:
    output: true
    permalink: /labs/:title
  pages:
    output: true
    permalink: /:title
  papers:
    output: true
    permalink: /papers/:title
  people:
    output: true
    permalink: /people/:title
  topics:
    output: true
    permalink: /topics/:title
  podcast:
    output: true
    permalink: /podcast/:title

# Default Settings
defaults:
  # Demos
  - scope:
      path: "_demos"
      type: "demos"
    values:
      folder: "Demos"
      img-path: "posts"
      parent: "demos"
      layout: "demos"
      short: "true"
      schematype: "VideoObject"
      og-type: "video.other"
  
  # Direct Messages
  - scope:
      path: "_dm"
      type: "dm"
    values:
      folder: "Direct message"
      img-path: "people"
      parent: "dm"
      layout: "dm"
      short: "true"
      schematype: "Article"
      og-type: "website"
  
  # Thoughts
  - scope:
      path: "_thoughts"
      type: "thoughts"
    values:
      folder: "Thoughts"
      img-path: "posts"
      parent: "thoughts"
      layout: "thoughts"
      short: "true"
      schematype: "NewsArticle"
      og-type: "article"
  
  # Events
  - scope:
      path: "_events"
      type: "events"
    values:
      folder: "Events"
      img-path: "logos"
      parent: "events"
      layout: "events"
      short: "true"
      schematype: "Event"
      og-type: "website"
 
  # Organizations
  - scope:
      path: "_orgs"
      type: "orgs"
    values:
      folder: "Organizations"
      img-path: "logos"
      parent: "orgs"
      layout: "orgs"
      short: "true"
      schematype: "Organization"
      og-type: "website"
  
  # Books
  - scope:
      path: "_books"
      type: "books"
    values:
      folder: "Book club"
      img-path: "books"
      parent: "books"
      layout: "book"
      short: "true"
      schematype: "Book"
      og-type: "book"
  
  # Research
  - scope:
      path: "_research"
      type: "research"
    values:
      folder: "Research"
      img-path: "posts"
      parent: "research"
      layout: "research"
      short: "true"
      schematype: "NewsArticle"
      og-type: "article"
  
  # People
  - scope:
      path: "_people"
      type: "people"
    values:
      folder: "People"
      img-path: "people"
      parent: "people"
      layout: "people"
      short: "false"
      schematype: "ProfilePage"
      og-type: "profile"
  
  # Posts (Signal)
  - scope:
      path: "_posts"
      type: "posts"
    values:
      folder: "Signal"
      img-path: "posts"
      parent: "signal"
      layout: "signal"
      short: "false"
      schematype: "NewsArticle"
      og-type: "article"
  
  # Topics
  - scope:
      path: "_topics"
      type: "topics"
    values:
      folder: "Topics"
      img-path: "pages"
      parent: "topics"
      layout: "topic"
      short: "false"
      schematype: "WebPage"
      og-type: "website"

  # Podcast
  - scope:
      path: "_podcast"
      type: "podcast"
    values:
      folder: "Podcast"
      img-path: "people"
      parent: "podcast"
      layout: "podcast"
      short: "true"
      schematype: "PodcastEpisode"
      og-type: "audio"

  # Labs
  - scope:
      path: "_labs"
      type: "labs"
    values:
      folder: "Labs"
      img-path: "posts"
      parent: "labs"
      layout: "labs"
      short: "true"
      schematype: "WebPage"
      og-type: "website"

  # Pages
  - scope:
      path: "_pages"
      type: "pages"
    values:
      folder: "Pages"
      img-path: "pages"
      parent: "pages"
      layout: "default"
      short: "false"
      schematype: "WebPage"
      og-type: "website"
  
  # Briefs
  - scope:
      path: "_briefs"
      type: "briefs"
    values:
      folder: "Briefs"
      img-path: "posts"
      parent: "briefs"
      layout: "briefs"
      short: "true"
      schematype: "NewsArticle"
      og-type: "article"
  
  # Papers
  - scope:
      path: "_papers"
      type: "papers"
    values:
      folder: "Papers"
      img-path: "posts"
      parent: "papers"
      layout: "papers"
      short: "true"
      schematype: "NewsArticle"
      og-type: "article"
  
  # Default for all other content
  - scope:
      path: ""
      type: ""
    values:
      folder: ""
      img-path: ""
      parent: ""
      layout: "cards"

# Build Exclusions
exclude:
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - .claude/
  - _config_dev.yml
  - assets/font-awesome/svgs/
  - assets/web-awesome/chunks/
  - assets/web-awesome/components/
  - assets/web-awesome/skills/
  - assets/web-awesome/events/
  - assets/web-awesome/internal/