<wa-card>
  {% if item.img %}
    <img
      class="wa-border-radius-circle sm mb-4 drop-shadow border"
      src="{{ site.baseurl }}/assets/img/{{ item.img-path }}/{{ item.img }}"
      alt="{{ item.img-alt }}">
  {% endif %}
  {% if item.name %}
    <h2 class="h4">
      <a href="{{ site.baseurl }}{{ item.url }}" class="card-link">{{ item.name | join: ", " }}</a>
    </h2>
  {% endif %}
  {% if item.description %}
    <p class="small text-body-secondary">
      <small>{{ item.description }}</small>
    </p>
  {% endif %}
</wa-card>
