{% if include.level == "secondary" %}
  <div class="col-12 col-sm-12 col-md-4 col-lg-4 col-xl-4 d-flex align-items-stretch">
    <wa-card class="mx-2"{% if item.img-og %} with-media{% endif %}>
      {% if item.img-og %}
        <img
          slot="media"
          alt="{{ item.img-alt }}"
          class="xxl border-bottom"
          src="{{ site.baseurl }}/assets/img/logos/{{ item.img-og }}">
      {% endif %}
      {% if item.title %}
        <h2 class="h4">
          <a href="{{ site.baseurl }}{{ item.url }}">{{ item.title }}</a>
        </h2>
        <p class="small text-body-secondary">
          <small>{{ item.description }}</small>
        </p>
      {% endif %}
    </wa-card>
  </div>
{% else %}
  <div class="col-12 col-sm-12 col-md-4 col-lg-4 col-xl-4 d-flex align-items-stretch">
    <wa-card class="mx-2"{% if item.img-og %} with-media{% endif %}>
      {% if item.img-og %}
        <img
          slot="media"
          alt="{{ item.img-alt }}"
          class="xxl border-bottom"
          src="{{ site.baseurl }}/assets/img/logos/{{ item.img-og }}">
      {% endif %}
      {% if item.title %}
        <h2 class="h4">
          <a href="{{ site.baseurl }}{{ item.url }}">{{ item.title }}</a>
        </h2>
        <p class="small text-body-secondary">
          <small>{{ item.description }}</small>
        </p>
      {% endif %}
    </wa-card>
  </div>
{% endif %}
