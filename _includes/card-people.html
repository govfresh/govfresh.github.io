{% unless item.show == 'hide' %}
  <wa-card>
    {% if item.img %}
      <img
        class="wa-border-radius-circle xs mb-4 drop-shadow border"
        src="{{ site.baseurl }}/assets/img/{{ item.img-path }}/{{ item.img-feat }}"
        alt="{{ item.img-alt }}">
    {% endif %}
    {% if item.title %}
      <h2 class="h5">
        <a href="{{ site.baseurl }}{{ item.url }}" class="card-link">{{ item.title }}</a>
      </h2>
    {% endif %}
    {% if item.position %}
      <p class="small text-body-secondary">
        <small>{{ item.position }}<br>{{ item.org }}</small>
      </p>
    {% endif %}
    {% include role.html %}
  </wa-card>
{% endunless %}
