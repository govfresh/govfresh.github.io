{% unless item.show == 'hide' %}
  <div class="col-12 col-sm-12 col-md-4 col-lg-3 col-xl-3 d-flex align-items-stretch">
    <wa-card class="mx-2 mb-3 drop-shadow2">
      {% if item.img %}
        <img
          class="rounded-circle xs mb-4 drop-shadow border"
          src="{{ site.baseurl }}/assets/img/{{ item.img-path }}/{{ item.img-feat }}"
          alt="{{ item.img-alt }}">
      {% endif %}
      {% if item.title %}
        <h2 class="h5">
          <a href="{{ site.baseurl }}{{ item.url }}">{{ item.title }}</a>
        </h2>
      {% endif %}
      {% if item.position %}
        <p class="small text-body-secondary">
          <small>{{ item.position }}<br>{{ item.org }}</small>
        </p>
      {% endif %}
      {% include role.html %}
    </wa-card>
  </div>
{% endunless %}
