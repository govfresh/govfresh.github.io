<footer>
  {% unless page.url contains '/subscribe' %}
  <wa-button
    href="{{ site.baseurl }}/subscribe"
    id="subscribe-button"
    aria-label="Subscribe"
    tabindex="-1"
    size="s"
    class="subscribe">
    Subscribe
  </wa-button>
  <script src="{{ site.baseurl }}/js/subscribe-button.js" defer></script>
  {% endunless %}
  <div class="container mt-5">
    <wa-callout class="mb-4">
      <small>
        <i class="fa-solid fa-lightbulb"></i>
        Help make GovFresh better: <a href="{{ site.baseurl }}/feedback">Send us your feedback</a>
      </small>
    </wa-callout>
  </div>
  <wa-divider></wa-divider>
  <div class="container footer-bar">
    <ul class="footer-nav">
      {% for item in site.data.nav.docs %}
        {% if item.url %}
          <li><a href="{{ site.baseurl }}{{ item.url }}">{{ item.title }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
    <p class="mb-0">
      <a href="{{ site.baseurl }}/site-index/">Site index</a>
      &nbsp;&middot;&nbsp;
      <a href="https://my.scangov.com/public/key6541-1749843847485/govfresh-com/report">ScanGov Scorecard <i class="fa-solid fa-star" aria-hidden="true"></i></a>
    </p>
  </div>
</footer>
{% include js.html %}</body></html>
