{% if page.role %}
  {% assign role = page.role %}
{% elsif item.role %}
  {% assign role = item.role %}
{% elsif author_data.role %}
  {% assign role = author_data.role %}
{% endif %}
{% if role == "Maintainer" %}
  <wa-badge appearance="filled-outlined" variant="neutral">Maintainer</wa-badge>
{% endif %}
{% if role == "Contributor" %}
  <wa-badge variant="neutral">Contributor</wa-badge>
{% endif %}
