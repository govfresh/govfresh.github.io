---
layout: default
title: Signal
description: "What's on our radar."
parent: signal
redirect_from:
  - /signal
---
<div class="wa-grid" style="--min-column-size: 300px">
  {% for post in site.posts limit: 100 %}
    <wa-card>
      <h2 class="h5 mb-2">
        <a href="{{ site.baseurl }}{{ post.url }}" class="card-link">{{ post.title }}</a>
      </h2>
      {% if post.description %}
        <p class="small text-body-secondary mb-2">{{ post.description }}</p>
      {% endif %}
      <p class="small text-body-secondary mb-0">{{ post.date | date: site.date }}</p>
    </wa-card>
  {% endfor %}
</div>
